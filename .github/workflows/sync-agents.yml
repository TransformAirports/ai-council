name: Sync agents to Supabase

on:
  push:
    branches: [main]
    paths:
      - '.claude/agents/**'
      - 'README.md'
      - 'scripts/sync-agents.mjs'
      - '.github/workflows/sync-agents.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Sync agents
        run: node scripts/sync-agents.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GIT_SHA: ${{ github.sha }}
